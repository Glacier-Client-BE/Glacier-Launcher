name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # Opt-in to Node 24 to silence deprecation warnings for actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Determine Next Version
      id: versioning
      shell: pwsh
      run: |
        $tags = git tag -l "v*" | Sort-Object { [version]($_ -replace 'v','') }
        if ($null -eq $tags -or $tags.Count -eq 0) {
            $latest = "1.0.6"
        } else {
            $latest = ($tags[-1] -replace 'v','')
        }
        $v = [version]$latest
        # Ensure we increment the correct part of the version string
        $next = "v$($v.Major).$($v.Minor).$($v.Build + 1)"
        echo "NEXT_TAG=$next" >> $env:GITHUB_OUTPUT
        Write-Host "Next version: $next"

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build and Publish Single File Exe
      run: >
        dotnet publish GlacierLauncher.csproj
        -c Release
        -r win-x64
        --self-contained true
        -p:PublishSingleFile=true
        -p:IncludeNativeLibrariesForSelfExtract=true
        -o "${{ github.workspace }}\publish"

    - name: Create and Push Tag
      shell: pwsh
      run: |
        $tag = "${{ steps.versioning.outputs.NEXT_TAG }}"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag $tag
        git push origin $tag

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.versioning.outputs.NEXT_TAG }}
        generate_release_notes: true
        files: ${{ github.workspace }}/publish/GlacierLauncher.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}