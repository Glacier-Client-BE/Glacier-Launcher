name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build and Publish Single File Exe
      # Added StaticWebAssetsEnabled=true here to force Blazor content into the publish folder
      run: dotnet publish GlacierLauncher.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:StaticWebAssetsEnabled=true -o "${{ github.workspace }}\publish"

    - name: Verify Publish Directory
      shell: pwsh
      run: |
        if (Test-Path "${{ github.workspace }}\publish") {
            Get-ChildItem -Path "${{ github.workspace }}\publish" -Recurse
        } else {
            Write-Error "Publish directory not found!"
            exit 1
        }

    - name: Create Zip Archive
      shell: pwsh
      run: Compress-Archive -Path "${{ github.workspace }}\publish\*" -DestinationPath "${{ github.workspace }}\GlacierLauncher-win-x64.zip" -Force

    - name: Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        generate_release_notes: true
        files: |
          ${{ github.workspace }}/publish/GlacierLauncher.exe
          ${{ github.workspace }}/GlacierLauncher-win-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}